<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ghostGrad" x1="0" y1="0" x2="120" y2="2.75" gradientUnits="userSpaceOnUse">
      <stop stopColor="#8FCDFC"/>
      <stop offset="1" stopColor="#C09CFF"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stopColor="#8FCDFC">
        <animate attributeName="stop-color" values="#8FCDFC;#C09CFF;#8FCDFC" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stopColor="#C09CFF">
        <animate attributeName="stop-color" values="#C09CFF;#8FCDFC;#C09CFF" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stopColor="#8FCDFC">
        <animate attributeName="stop-color" values="#8FCDFC;#C09CFF;#8FCDFC" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stopColor="#8FCDFC" stopOpacity="0.5">
        <animate attributeName="stop-opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="60%" stopColor="#C09CFF" stopOpacity="0.2">
        <animate attributeName="stop-opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stopColor="#C09CFF" stopOpacity="0"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Outer pulsing glow -->
  <circle cx="60" cy="60" r="52" fill="url(#glowGrad)">
    <animate attributeName="r" values="48;54;48" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
  </circle>

  <!-- Spinning gradient ring -->
  <circle cx="60" cy="60" r="44" fill="none" stroke="url(#ringGrad)" strokeWidth="1.5" strokeDasharray="8 4" opacity="0.7">
    <animateTransform attributeName="transform" type="rotate" from="0 60 60" to="360 60 60" dur="20s" repeatCount="indefinite"/>
  </circle>

  <!-- Second ring spinning opposite -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#ringGrad)" strokeWidth="0.8" strokeDasharray="3 8" opacity="0.4">
    <animateTransform attributeName="transform" type="rotate" from="360 60 60" to="0 60 60" dur="28s" repeatCount="indefinite"/>
  </circle>

  <!-- Inner glow behind ghost -->
  <circle cx="60" cy="60" r="28" fill="url(#ghostGrad)" opacity="0.12" filter="url(#outerGlow)">
    <animate attributeName="opacity" values="0.1;0.2;0.1" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Ghost icon body (rounded rect) -->
  <g filter="url(#glow)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-3;0,0" dur="3s" repeatCount="indefinite" calcMode="spline" keySplines="0.4 0 0.6 1;0.4 0 0.6 1"/>
    <rect x="33" y="33" width="54" height="54" rx="21" fill="url(#ghostGrad)"/>
    <!-- k letterform -->
