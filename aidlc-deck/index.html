body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0a;color:#f5f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center}

input[type="password"]::placeholder{color:#555}
button{width:100%;padding:1rem;border-radius:14px;border:none;background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(59,130,246,0.3)}
button:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(59,130,246,0.4)}
button:active{transform:translateY(0)}
button:disabled{opacity:0.6;cursor:not-allowed;transform:none}
.error{color:#ef4444;font-size:0.8rem;margin-top:0.75rem;display:none;animation:shake 0.3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.loading{display:none;color:#86868b;font-size:0.85rem;margin-top:1rem}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #333;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.6s linear infinite;margin-right:0.5rem;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

<script>
(function(){
  async function deriveKey(passkey,salt){
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(passkey),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  }

  function b64ToUint8(b64){
    const bin=atob(b64);
    const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);
    return arr;
  }

  async function decrypt(packed,passkey){
    const data=b64ToUint8(packed);
    const salt=data.slice(0,16);
    const iv=data.slice(16,28);
    const ct=data.slice(28);
    const key=await deriveKey(passkey,salt);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    return new TextDecoder().decode(plain);
  }

  const form=document.getElementById('unlock-form');
  const input=document.getElementById('passkey-input');
  const errEl=document.getElementById('error-msg');
  const loadEl=document.getElementById('loading-msg');
  const btn=document.getElementById('unlock-btn');

  form.addEventListener('submit',async function(e){
    e.preventDefault();
    const passkey=input.value.trim();
    if(!passkey)return;
    errEl.style.display='none';
    loadEl.style.display='block';
    btn.disabled=true;

    try{
      const payload=document.getElementById('__ENCRYPTED_PAYLOAD__').textContent;
      const html=await decrypt(payload,passkey);
      // Replace entire document with decrypted content
      document.open();
      document.write(html);
      document.close();
    }catch(err){
      loadEl.style.display='none';
      errEl.style.display='block';
      btn.disabled=false;
      input.select();
    }
  });
})();
</script>
