<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;
  background:#f5f5f7;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:1.5rem;
  min-height:100vh;
}

/* Top bar */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;
  background:rgba(255,255,255,0.72);
  backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.08);
  z-index:100;
}
.topbar-brand{
  display:flex;align-items:center;gap:6px;
  font-size:0.9rem;font-weight:600;color:#1d1d1f;
  letter-spacing:-0.01em;
}
.topbar-brand svg{width:20px;height:20px}

/* Card */
.card{
  background:#fff;
  border-radius:18px;
  box-shadow:0 4px 24px rgba(0,0,0,0.06),0 1px 4px rgba(0,0,0,0.04);
  padding:2.75rem 2.5rem 2.25rem;
  max-width:440px;
  width:100%;
  text-align:center;
}

/* Dotted ring + logo */
.logo-area{
  width:120px;height:120px;
  margin:0 auto 1.5rem;
  position:relative;
  display:flex;align-items:center;justify-content:center;
}
.dot-ring{
  position:absolute;inset:0;
  animation:dot-spin 20s linear infinite;
}
@keyframes dot-spin{to{transform:rotate(360deg)}}
.kiro-icon{
  width:52px;height:52px;
  border-radius:12px;
  position:relative;z-index:2;
}

/* Typography */
h1{
  font-size:1.55rem;font-weight:700;color:#1d1d1f;
  letter-spacing:-0.025em;margin-bottom:1.75rem;
}

/* Input field — iCloud style */
.field-wrap{
  position:relative;margin-bottom:0.5rem;
}
.field-wrap input{
  width:100%;
  padding:1rem 3rem 1rem 1.1rem;
  border-radius:10px;
  border:1px solid #d2d2d7;
  background:#fff;
  color:#1d1d1f;
  font-size:1rem;
  font-family:inherit;
  outline:none;
  transition:border-color 0.2s,box-shadow 0.2s;
}
.field-wrap input:focus{
  border-color:#0071e3;
  box-shadow:0 0 0 3px rgba(0,113,227,0.1);
}
.field-wrap input::placeholder{color:#86868b}
.field-wrap .eye-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:#86868b;font-size:16px;padding:6px;line-height:1;
  border-radius:4px;
}
.field-wrap .eye-btn:hover{background:rgba(0,0,0,0.04)}

/* Spacer */
.spacer{height:1.5rem}

/* Slider — swipe to unlock */
.slider-wrap{
  position:relative;
  height:52px;
  border-radius:26px;
  background:linear-gradient(135deg,#0071e3,#34aadc);
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  box-shadow:0 2px 8px rgba(0,113,227,0.2);
  cursor:default;
}
.slider-track{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.slider-label{
  color:rgba(255,255,255,0.85);
  font-size:0.85rem;font-weight:500;
  letter-spacing:0.02em;
  pointer-events:none;
  transition:opacity 0.3s;
}
.slider-thumb{
  position:absolute;left:4px;top:4px;
  width:44px;height:44px;
  border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  box-shadow:0 1px 4px rgba(0,0,0,0.15);
  transition:box-shadow 0.2s;
  z-index:2;
}
.slider-thumb:active{cursor:grabbing;box-shadow:0 3px 12px rgba(0,0,0,0.2)}
.slider-thumb svg{width:18px;height:18px}
.slider-fill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:26px;
  background:rgba(255,255,255,0.12);
  pointer-events:none;
  transition:width 0.05s;
}
.slider-wrap.success{background:linear-gradient(135deg,#34c759,#30d158)}

/* Error */
.error-msg{
  color:#ff3b30;font-size:0.78rem;
  margin-top:0.75rem;
  display:none;
  animation:shake 0.4s;
}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

/* Loading */
.loading-msg{
  display:none;
  margin-top:0.75rem;
  color:#86868b;font-size:0.8rem;
}
.loading-msg .spinner{
  display:inline-block;width:12px;height:12px;
  border:2px solid #d2d2d7;border-top-color:#0071e3;
  border-radius:50%;
  animation:spin 0.6s linear infinite;
  margin-right:6px;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Footer */
.footer{
  margin-top:1.5rem;
  color:#86868b;font-size:0.7rem;
  letter-spacing:0.01em;
}

/* Responsive */
@media(max-width:480px){
  .card{padding:2rem 1.5rem 1.75rem;border-radius:14px}
  h1{font-size:1.35rem}
  .topbar{padding:0 16px}
}
</style>

<script>
(function(){
  // === Crypto ===
  async function deriveKey(passkey,salt){
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(passkey),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  }
  function b64ToUint8(b64){
    const bin=atob(b64);const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;
  }
  async function decrypt(packed,passkey){
    const data=b64ToUint8(packed);
    const salt=data.slice(0,16);const iv=data.slice(16,28);const ct=data.slice(28);
    const key=await deriveKey(passkey,salt);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    return new TextDecoder().decode(plain);
  }

  // === Toggle password visibility ===
  const input=document.getElementById('passkey-input');
  const toggleBtn=document.getElementById('toggle-vis');
  toggleBtn.addEventListener('click',()=>{
    const isPass=input.type==='password';
    input.type=isPass?'text':'password';
    toggleBtn.textContent=isPass?'🙈':'👁';
  });

  // === Swipe-to-unlock slider ===
  const wrap=document.getElementById('slider-wrap');
  const thumb=document.getElementById('slider-thumb');
  const fill=document.getElementById('slider-fill');
  const label=document.getElementById('slider-label');
  const errEl=document.getElementById('error-msg');
  const loadEl=document.getElementById('loading-msg');

  const THUMB_W=44;
  const PAD=4;
  let dragging=false,startX=0,thumbLeft=PAD;

  function getMaxLeft(){return wrap.offsetWidth-THUMB_W-PAD*2;}
  function setThumbPos(x){
    thumbLeft=Math.max(PAD,Math.min(x,getMaxLeft()+PAD));
    thumb.style.left=thumbLeft+'px';
    fill.style.width=(thumbLeft+THUMB_W/2)+'px';
    const progress=(thumbLeft-PAD)/getMaxLeft();
    label.style.opacity=1-progress*2;
  }

  function resetSlider(){
    thumbLeft=PAD;
    thumb.style.transition='left 0.4s cubic-bezier(0.32,0.72,0,1)';
    fill.style.transition='width 0.4s cubic-bezier(0.32,0.72,0,1)';
    setThumbPos(PAD);
    setTimeout(()=>{thumb.style.transition='';fill.style.transition='';},400);
    wrap.classList.remove('success');
  }

  thumb.addEventListener('pointerdown',(e)=>{
    if(loadEl.style.display==='block')return;
    dragging=true;startX=e.clientX-thumbLeft;
    thumb.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  document.addEventListener('pointermove',(e)=>{
    if(!dragging)return;
    setThumbPos(e.clientX-startX);
  });
  document.addEventListener('pointerup',async()=>{
    if(!dragging)return;
    dragging=false;
    const progress=(thumbLeft-PAD)/getMaxLeft();
    if(progress>0.85){
      wrap.classList.add('success');
      await attemptUnlock();
    }else{
      resetSlider();
    }
  });

  async function attemptUnlock(){
    const passkey=input.value.trim();
    if(!passkey){
      errEl.textContent='กรุณากรอก Passkey ก่อน';
      errEl.style.display='block';
      resetSlider();
      return;
    }
    errEl.style.display='none';
    loadEl.style.display='block';
    try{
      const payload=document.getElementById('__ENCRYPTED_PAYLOAD__').textContent;
      const html=await decrypt(payload,passkey);
      document.open();document.write(html);document.close();
    }catch(err){
      loadEl.style.display='none';
      errEl.textContent='Passkey ไม่ถูกต้อง กรุณาลองใหม่';
      errEl.style.display='block';
      input.select();
      resetSlider();
    }
  }

  // Enter key triggers slider animation then unlock
  input.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      thumb.style.transition='left 0.5s cubic-bezier(0.32,0.72,0,1)';
      fill.style.transition='width 0.5s cubic-bezier(0.32,0.72,0,1)';
      setThumbPos(getMaxLeft()+PAD);
      wrap.classList.add('success');
      setTimeout(()=>{thumb.style.transition='';fill.style.transition='';attemptUnlock();},500);
    }
  });
})();
</script>
</body>
</html>
