<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🔒 AI-DLC × Kiro — Protected</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔒</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --accent:#9046ff;
  --accent-glow:rgba(144,70,255,0.25);
  --surface:rgba(255,255,255,0.04);
  --border:rgba(255,255,255,0.08);
  --text:#f5f5f7;
  --muted:#86868b;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{
  font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:var(--text);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;padding:1.5rem;
  overflow:hidden;
}

/* Ambient background */
.bg-glow{
  position:fixed;inset:0;pointer-events:none;z-index:0;
}
.bg-glow::before{
  content:'';position:absolute;
  width:600px;height:600px;
  top:-10%;left:-10%;
  background:radial-gradient(circle,rgba(144,70,255,0.12) 0%,transparent 70%);
  animation:float-a 12s ease-in-out infinite;
}
.bg-glow::after{
  content:'';position:absolute;
  width:500px;height:500px;
  bottom:-10%;right:-10%;
  background:radial-gradient(circle,rgba(0,113,227,0.08) 0%,transparent 70%);
  animation:float-b 15s ease-in-out infinite;
}
@keyframes float-a{0%,100%{transform:translate(0,0)}50%{transform:translate(30px,20px)}}
@keyframes float-b{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-30px)}}

/* Content */
.content{position:relative;z-index:1;text-align:center;max-width:400px;width:100%}

/* Icon area */
.icon-area{
  margin-bottom:2rem;
  display:flex;align-items:center;justify-content:center;
}
.icon-circle{
  width:88px;height:88px;
  border-radius:50%;
  background:var(--surface);
  border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 40px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.06);
  animation:pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 40px var(--accent-glow),inset 0 1px 0 rgba(255,255,255,0.06)}50%{box-shadow:0 0 60px rgba(144,70,255,0.35),inset 0 1px 0 rgba(255,255,255,0.06)}}
/* MUI Lock icon */
.lock-icon{width:36px;height:36px;fill:var(--accent)}

/* Typography — Apple product page style */
h1{
  font-size:clamp(2rem,5vw,2.8rem);
  font-weight:800;
  letter-spacing:-0.03em;
  line-height:1.1;
  margin-bottom:0.75rem;
  background:linear-gradient(135deg,#f5f5f7 30%,#a1a1a6);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.subtitle{
  font-size:1rem;
  color:var(--muted);
  line-height:1.5;
  margin-bottom:2.5rem;
  font-weight:400;
}

/* Input */
.field{
  position:relative;
  margin-bottom:2rem;
}
.field input{
  width:100%;
  padding:16px 48px 16px 20px;
  border-radius:14px;
  border:1px solid var(--border);
  background:var(--surface);
  color:var(--text);
  font-size:1rem;
  font-family:inherit;
  outline:none;
  transition:border-color 0.3s,box-shadow 0.3s;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.field input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-glow);
}
.field input::placeholder{color:rgba(255,255,255,0.3)}
.field .eye{
  position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:var(--muted);font-size:18px;padding:4px;
}

/* Slider */
.slider-wrap{
  position:relative;height:56px;
  border-radius:28px;
  background:rgba(255,255,255,0.06);
  border:1px solid var(--border);
  overflow:hidden;
  user-select:none;-webkit-user-select:none;
  touch-action:none;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.slider-fill{
  position:absolute;left:0;top:0;bottom:0;
  border-radius:28px;
  background:linear-gradient(90deg,rgba(144,70,255,0.15),rgba(144,70,255,0.25));
  pointer-events:none;
}
.slider-track{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
}
.slider-label{
  color:rgba(255,255,255,0.4);
  font-size:0.85rem;font-weight:500;
  letter-spacing:0.03em;
  pointer-events:none;
  transition:opacity 0.3s;
}
.slider-thumb{
  position:absolute;left:4px;top:4px;
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),#b06cff);
  display:flex;align-items:center;justify-content:center;
  cursor:grab;
  box-shadow:0 2px 12px var(--accent-glow);
  transition:box-shadow 0.2s;
  z-index:2;
}
.slider-thumb:active{cursor:grabbing;box-shadow:0 4px 20px rgba(144,70,255,0.5)}
.slider-thumb svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.slider-wrap.success .slider-thumb{background:linear-gradient(135deg,#34c759,#30d158)}
.slider-wrap.success{border-color:rgba(52,199,89,0.3)}

/* Messages */
.msg-error{
  color:#ff453a;font-size:0.82rem;text-align:center;
  margin-top:1rem;display:none;
  animation:shake 0.35s;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.msg-loading{
  display:none;text-align:center;
  margin-top:1rem;color:var(--muted);font-size:0.82rem;
}
.msg-loading .spin{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,0.1);border-top-color:var(--accent);
  border-radius:50%;animation:sp 0.6s linear infinite;
  margin-right:6px;vertical-align:middle;
}
@keyframes sp{to{transform:rotate(360deg)}}

/* Footer */
.footer{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 20px;text-align:center;
  font-size:0.68rem;color:rgba(255,255,255,0.25);
  letter-spacing:0.02em;
}

@media(max-width:480px){
  .icon-circle{width:72px;height:72px}
  .lock-icon{width:28px;height:28px}
  h1{font-size:1.8rem}
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="content">
  <!-- Lock icon -->
  <div class="icon-area">
    <div class="icon-circle">

    </div>
  </div>

  <div class="msg-error" id="error-msg"></div>
  <div class="msg-loading" id="loading-msg"><span class="spin"></span>Decrypting...</div>
</div>

<script>
(function(){
  async function deriveKey(passkey,salt){
    const enc=new TextEncoder();
    const km=await crypto.subtle.importKey('raw',enc.encode(passkey),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:600000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  }
  function b64ToUint8(b64){
    const bin=atob(b64);const arr=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return arr;
  }
  async function decrypt(packed,passkey){
    const data=b64ToUint8(packed);
    const salt=data.slice(0,16);const iv=data.slice(16,28);const ct=data.slice(28);
    const key=await deriveKey(passkey,salt);
    const plain=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
    return new TextDecoder().decode(plain);
  }

  const input=document.getElementById('passkey-input');
  const toggleBtn=document.getElementById('toggle-vis');
  toggleBtn.addEventListener('click',()=>{
    const isPass=input.type==='password';
    input.type=isPass?'text':'password';
    toggleBtn.textContent=isPass?'🙈':'👁';
  });

  const wrap=document.getElementById('slider-wrap');
  const thumb=document.getElementById('slider-thumb');
  const fill=document.getElementById('slider-fill');
  const label=document.getElementById('slider-label');
  const errEl=document.getElementById('error-msg');
  const loadEl=document.getElementById('loading-msg');

  const TW=48,PAD=4;
  let dragging=false,startX=0,tl=PAD;

  function mx(){return wrap.offsetWidth-TW-PAD*2;}
  function setPos(x){
    tl=Math.max(PAD,Math.min(x,mx()+PAD));
    thumb.style.left=tl+'px';
    fill.style.width=(tl+TW/2)+'px';
    label.style.opacity=1-((tl-PAD)/mx())*2;
  }
  function reset(){
    thumb.style.transition='left 0.4s cubic-bezier(0.32,0.72,0,1)';
    fill.style.transition='width 0.4s cubic-bezier(0.32,0.72,0,1)';
    setPos(PAD);
    setTimeout(()=>{thumb.style.transition='';fill.style.transition='';},400);
    wrap.classList.remove('success');
  }

  thumb.addEventListener('pointerdown',(e)=>{
    if(loadEl.style.display==='block')return;
    dragging=true;startX=e.clientX-tl;
    thumb.setPointerCapture(e.pointerId);e.preventDefault();
  });
  document.addEventListener('pointermove',(e)=>{if(!dragging)return;setPos(e.clientX-startX);});
  document.addEventListener('pointerup',async()=>{
    if(!dragging)return;dragging=false;
    if((tl-PAD)/mx()>0.85){wrap.classList.add('success');await doUnlock();}
    else reset();
  });

  async function doUnlock(){
    const pk=input.value.trim();
    if(!pk){errEl.textContent='กรุณากรอก Passkey ก่อน';errEl.style.display='block';reset();return;}
    errEl.style.display='none';loadEl.style.display='block';
    try{
      const payload=document.getElementById('__ENCRYPTED_PAYLOAD__').textContent;
      const html=await decrypt(payload,pk);
      document.open();document.write(html);document.close();
    }catch{
      loadEl.style.display='none';
      errEl.textContent='Passkey ไม่ถูกต้อง กรุณาลองใหม่';
      errEl.style.display='block';
      input.select();reset();
    }
  }

  input.addEventListener('keydown',(e)=>{
    if(e.key==='Enter'){
      e.preventDefault();
      thumb.style.transition='left 0.5s cubic-bezier(0.32,0.72,0,1)';
      fill.style.transition='width 0.5s cubic-bezier(0.32,0.72,0,1)';
      setPos(mx()+PAD);wrap.classList.add('success');
      setTimeout(()=>{thumb.style.transition='';fill.style.transition='';doUnlock();},500);
    }
  });
})();
</script>
