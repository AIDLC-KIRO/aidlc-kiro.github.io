<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AI-DLC × Kiro — Enterprise</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🔒</text></svg>"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ─── Reset ─────────────────────────────────────── */
*{margin:0;padding:0;box-sizing:border-box}

/* ─── Root: everything in vw / vmin — truly fluid ─ */
:root{
  --s: 2.2vw;       /* base scale unit: grows with viewport */
  --r: 980px;       /* pill border-radius */
}

html,body{width:100%;height:100%}
body{
  font-family:'Inter','Noto Sans Thai',-apple-system,BlinkMacSystemFont,sans-serif;
  background:#000;
  color:#f5f5f7;
  display:grid;
  place-items:center;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* ─── Cinematic BG ──────────────────────────────── */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg .g{position:absolute;border-radius:50%;filter:blur(min(10vw,100px));animation:drift 26s ease-in-out infinite alternate}
.bg .g1{width:60vw;height:60vw;top:-18%;left:-12%;background:radial-gradient(circle,rgba(124,72,210,.22),transparent 64%)}
.bg .g2{width:46vw;height:46vw;bottom:-14%;right:-8%;background:radial-gradient(circle,rgba(0,112,255,.14),transparent 64%);animation-delay:-9s;animation-duration:32s}
.bg .g3{width:36vw;height:36vw;top:48%;left:44%;background:radial-gradient(circle,rgba(225,90,55,.06),transparent 64%);animation-delay:-15s;animation-duration:36s}
@keyframes drift{to{transform:translate(3vw,2.5vw) scale(1.07)}}
.bg .grain{position:absolute;inset:0;opacity:.028;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
.bg .vig{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 42%,transparent 40%,rgba(0,0,0,.55) 100%)}

/* ─── Main content ──────────────────────────────── */
.main{
  position:relative;z-index:1;
  text-align:center;
  display:flex;flex-direction:column;align-items:center;
  width:min(92vw, 720px);   /* headline zone: wide enough to breathe */
}
/* Controls zone (input + slider) narrower than headline */
.controls{
  width:min(92vw, 380px);
  display:flex;flex-direction:column;align-items:stretch;
}

/* Stagger animation */
.main>*{opacity:0;animation:rise .9s cubic-bezier(.16,1,.3,1) forwards}
.main>*:nth-child(1){animation-delay:.06s}
.main>*:nth-child(2){animation-delay:.2s}
.main>*:nth-child(3){animation-delay:.34s}
.main>*:nth-child(4){animation-delay:.48s}
.main>*:nth-child(5){animation-delay:.62s}
.main>*:nth-child(6){animation-delay:.76s}
.main>*:nth-child(7){animation-delay:.9s}
@keyframes rise{from{opacity:0;transform:translateY(1.5vh)}to{opacity:1;transform:none}}

/* ─── Hero orb ──────────────────────────────────── */
.orb-wrap{
  position:relative;
  width:clamp(80px, 12vmin, 160px);
  aspect-ratio:1;
  margin-bottom:clamp(20px, 3vh, 44px);
  display:flex;align-items:center;justify-content:center;
}
.orb{
  position:absolute;inset:0;border-radius:50%;
  background:
    radial-gradient(circle at 32% 28%, rgba(255,255,255,.45), transparent 38%),
    conic-gradient(from 210deg, #7a5cff, #2997ff, #30d3c0, #7a5cff);
  box-shadow:
    0 0 0 1px rgba(255,255,255,.08),
    0 min(3vw,32px) min(8vw,80px) rgba(80,60,200,.4),
    inset 0 -6px 24px rgba(0,0,0,.4),
    inset 0 4px 16px rgba(255,255,255,.22);
  animation:orb-spin 14s linear infinite;
}
@keyframes orb-spin{to{transform:rotate(360deg)}}
.orb-glow{
  position:absolute;inset:-26%;border-radius:50%;
  background:radial-gradient(circle,rgba(122,92,255,.38),transparent 60%);
  filter:blur(min(4vw,40px));
  animation:pulse 4s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
.orb-lock{
  position:relative;z-index:2;
  width:38%;aspect-ratio:1;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  background:rgba(10,10,15,.55);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);
}
.orb-lock svg{width:50%;height:50%;fill:#fff}

/* ─── Overline ──────────────────────────────────── */
.overline{
  display:inline-flex;align-items:center;gap:.5em;
  font-size:clamp(10px, 1vw, 13px);
  font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  color:#a9c7ff;
  margin-bottom:clamp(14px, 2vh, 28px);
  padding:.5em 1.1em;border-radius:var(--r);
  border:1px solid rgba(122,150,255,.25);
  background:rgba(122,150,255,.06);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  white-space:nowrap;
}
.overline::before{content:'';width:.45em;height:.45em;border-radius:50%;background:#5e9bff;box-shadow:0 0 .6em #5e9bff}

/* ─── Headline — fluid vw ───────────────────────── */
h1{
  font-size:clamp(24px, 3.6vw, 58px);
  font-weight:700;
  letter-spacing:-.03em;
  line-height:1.07;
  margin-bottom:clamp(10px, 1.4vh, 20px);
  background:linear-gradient(180deg,#fff 0%,#fff 50%,#bbbbc2 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ─── Subtitle ──────────────────────────────────── */
.sub{
  font-size:clamp(14px, 1.5vw, 22px);
  font-weight:400;color:#9a9aa2;
  line-height:1.5;letter-spacing:-.005em;
  margin-bottom:clamp(24px, 4vh, 52px);
}

/* ─── Input ─────────────────────────────────────── */
.field{position:relative;width:100%;margin-bottom:clamp(12px, 1.5vh, 20px)}
.field input{
  width:100%;
  padding:.85em 2.8em .85em 1.1em;
  border-radius:.75em;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  color:#f5f5f7;
  font-size:clamp(14px, 1.2vw, 18px);
  font-family:inherit;
  outline:none;
  transition:all .3s;
}
.field input:focus{
  border-color:rgba(94,155,255,.6);
  background:rgba(94,155,255,.05);
  box-shadow:0 0 0 4px rgba(94,155,255,.12);
}
.field input::placeholder{color:rgba(255,255,255,.3)}
.field .eye{
  position:absolute;right:.75em;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.35);padding:.3em;border-radius:.5em;
  transition:color .2s,background .2s;display:flex;
}
.field .eye:hover{color:#fff;background:rgba(255,255,255,.07)}
.field .eye svg{width:1.2em;height:1.2em}

/* ─── Slider ─────────────────────────────────────── */
.slider{
  position:relative;
  height:clamp(44px, 5.5vh, 60px);
  width:100%;
  border-radius:var(--r);
  background:linear-gradient(135deg,#0a84ff,#5e9bff);
  overflow:hidden;
  user-select:none;-webkit-user-select:none;touch-action:none;
  box-shadow:0 min(1.5vw,18px) min(5vw,50px) rgba(10,132,255,.3),inset 0 1px 0 rgba(255,255,255,.18);
  transition:transform .15s,box-shadow .3s;
}
.slider:hover{box-shadow:0 min(2vw,22px) min(6vw,60px) rgba(10,132,255,.42),inset 0 1px 0 rgba(255,255,255,.18)}
.slider:active{transform:scale(.985)}
.slider .fill{position:absolute;left:0;top:0;bottom:0;border-radius:var(--r);background:rgba(255,255,255,.07);pointer-events:none}
.slider .track{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.slider .lbl{
  color:#fff;
  font-size:clamp(13px, 1.1vw, 17px);
  font-weight:600;letter-spacing:.01em;
  pointer-events:none;transition:opacity .3s;
}
.slider .thumb{
  position:absolute;left:.28em;top:50%;transform:translateY(-50%);
  height:calc(100% - .56em);aspect-ratio:1;border-radius:50%;
  background:#fff;
  display:flex;align-items:center;justify-content:center;
  cursor:grab;z-index:2;
  box-shadow:0 2px 10px rgba(0,0,0,.2);
  transition:transform .12s;
}
.slider .thumb:hover{transform:translateY(-50%) scale(1.08)}
.slider .thumb:active{cursor:grabbing;transform:translateY(-50%) scale(.94)}
.slider .thumb svg{width:42%;height:42%;fill:none;stroke:#0a84ff;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.slider.ok{background:linear-gradient(135deg,#28a745,#34c759);box-shadow:0 min(1.5vw,18px) min(5vw,50px) rgba(52,199,89,.3)}
.slider.ok .thumb svg{stroke:#34c759}

/* ─── Trust / messages ───────────────────────────── */
.trust{
  display:flex;align-items:center;justify-content:center;gap:.5em;
  margin-top:clamp(16px, 2.5vh, 32px);
  color:rgba(255,255,255,.26);
  font-size:clamp(11px, .9vw, 14px);
  font-weight:500;letter-spacing:.01em;
}
.trust svg{width:1em;height:1em;fill:currentColor;opacity:.7}
.err{
  color:#ff6961;
  font-size:clamp(12px, 1vw, 15px);
  margin-top:1em;display:none;
  animation:shake .35s;
}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.ld{
  display:none;margin-top:1em;
  color:#9a9aa2;font-size:clamp(12px, 1vw, 15px);
}
.ld .sp{
  display:inline-block;width:1em;height:1em;
  border:2px solid rgba(255,255,255,.1);border-top-color:#5e9bff;
  border-radius:50%;animation:spin .6s linear infinite;
  margin-right:.5em;vertical-align:-.15em;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="bg">
  <div class="g g1"></div>
  <div class="g g2"></div>
  <div class="g g3"></div>
  <div class="grain"></div>
  <div class="vig"></div>
</div>

<div class="main">

  <div class="orb-wrap">
    <div class="orb-glow"></div>
    <div class="orb"></div>
    <div class="orb-lock">
      <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zM9 6c0-1.66 1.34-3 3-3s3 1.34 3 3v2H9V6zm3 11c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
    </div>
  </div>

  <div class="overline">Enterprise Edition</div>

  <h1>Shaping the Future<br>of Software Development</h1>

  <p class="sub">AI-DLC for Enterprise Teams</p>

  <div class="controls">
    <div class="field">
      <input type="password" id="pk" placeholder="Enter passkey" autocomplete="off" autofocus/>
      <button class="eye" id="eye" type="button" aria-label="Toggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>

    <div class="slider" id="sl">
      <div class="fill" id="fl"></div>
      <div class="track"><span class="lbl" id="lb">Slide to Unlock</span></div>
      <div class="thumb" id="th"><svg viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg></div>

    <div class="err" id="er"></div>
    <div class="ld" id="ld"><span class="sp"></span>Decrypting...</div>

    <div class="trust">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      <span>End-to-end encrypted · AES-256-GCM</span>
    </div>
  </div>

</div>

<script>
(function(){
  async function dk(p,s){
    const e=new TextEncoder();
    const k=await crypto.subtle.importKey('raw',e.encode(p),'PBKDF2',false,['deriveKey']);
    return crypto.subtle.deriveKey({name:'PBKDF2',salt:s,iterations:600000,hash:'SHA-256'},k,{name:'AES-GCM',length:256},false,['decrypt']);
  }
  function b(x){const s=atob(x);const a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
  async function dec(d,p){const r=b(d);return new TextDecoder().decode(await crypto.subtle.decrypt({name:'AES-GCM',iv:r.slice(16,28)},await dk(p,r.slice(0,16)),r.slice(28)));}

  // Toggle visibility
  const inp=document.getElementById('pk'),eye=document.getElementById('eye');
  let vis=false;
  const EYE='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
  const EYEOFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';
  eye.addEventListener('click',()=>{vis=!vis;inp.type=vis?'text':'password';eye.innerHTML=vis?EYEOFF:EYE;});

  // Slider
  const sl=document.getElementById('sl'),th=document.getElementById('th'),fl=document.getElementById('fl');
  const lb=document.getElementById('lb'),er=document.getElementById('er'),ld=document.getElementById('ld');
  let drag=false,sx=0,tl=0;

  function PAD(){
    // thumb's resting inset from edge (in CSS: left:.28em on slider font-size)
    const s=parseFloat(getComputedStyle(sl).fontSize)||16;
    return s*0.28;
  }
  function TW(){return th.offsetWidth;}
  function MX(){return sl.offsetWidth-TW()-PAD()*2;}
  function setPos(x){
    tl=Math.max(0,Math.min(x,MX()));
    th.style.left=(PAD()+tl)+'px';
    fl.style.width=(PAD()+tl+TW()/2)+'px';
    lb.style.opacity=1-(tl/MX())*2.2;
  }
  function reset(){
    const ease='left .4s cubic-bezier(.16,1,.3,1)';
    th.style.transition=ease;fl.style.transition='width .4s cubic-bezier(.16,1,.3,1)';
    setPos(0);
    setTimeout(()=>{th.style.transition='';fl.style.transition='';},400);
    sl.classList.remove('ok');
  }

  th.addEventListener('pointerdown',e=>{
    if(ld.style.display==='block')return;
    drag=true;sx=e.clientX-tl;th.setPointerCapture(e.pointerId);e.preventDefault();
  });
  document.addEventListener('pointermove',e=>{if(!drag)return;setPos(e.clientX-sx);});
  document.addEventListener('pointerup',async()=>{
    if(!drag)return;drag=false;
    if(MX()>0&&tl/MX()>.85){sl.classList.add('ok');await go();}
    else reset();
  });

  async function go(){
    const p=inp.value.trim();
    if(!p){er.textContent='กรุณากรอก Passkey';er.style.display='block';reset();return;}
    er.style.display='none';ld.style.display='block';
    try{
      const h=await dec(document.getElementById('__ENCRYPTED_PAYLOAD__').textContent,p);
      document.open();document.write(h);document.close();
    }catch{
      ld.style.display='none';
      er.textContent='Passkey ไม่ถูกต้อง';er.style.display='block';
      inp.select();reset();
    }
  }

  inp.addEventListener('keydown',e=>{
    if(e.key!=='Enter')return;
    e.preventDefault();
    th.style.transition='left .5s cubic-bezier(.16,1,.3,1)';
    fl.style.transition='width .5s cubic-bezier(.16,1,.3,1)';
    setPos(MX());sl.classList.add('ok');
    setTimeout(()=>{th.style.transition='';fl.style.transition='';go();},500);
  });
})();
